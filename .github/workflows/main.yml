name: Test Kirby Feed

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download image
        run: |
          mkdir -p images
          curl -L --http1.1 -o images/2760.jpg https://codecraftsupport.com/Kirby/DATA/Images/2760.jpg
          ls -lh images

      - name: Commit image
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .
          git commit -m "Add test image" || echo "Nothing to commit"
          git push
